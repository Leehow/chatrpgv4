name: epistemic-completion-diagnostics

on:
  pull_request:
    branches:
      - feature/scenario-epistemic-director-v1

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/scenario-epistemic-blueprint-completion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install pytest pypdf
      - name: Scope parse risk to delivered effects
        run: python scripts/apply_epistemic_metrics_scope_patch.py
      - name: Run focused epistemic suites
        run: >-
          PYTHONDONTWRITEBYTECODE=1 python -m pytest
          tests/test_cognitive_storylets_narration_metrics.py
          tests/test_epistemic_metrics_scope.py
          tests/test_epistemic_storylets_additional.py
          tests/test_epistemic_playtest_report.py
          tests/test_epistemic_blueprint_e2e.py
          tests/test_storylets.py
          tests/test_narration_envelope.py
          tests/test_narration_contract.py
          tests/test_playtest_report.py
          -q -p no:cacheprovider
      - name: Run full repository suite
        run: PYTHONDONTWRITEBYTECODE=1 python -m pytest tests/ -q -p no:cacheprovider
      - name: Commit scoped metrics implementation
        run: |
          if git diff --quiet -- plugins/coc-keeper/scripts/coc_epistemic_metrics.py; then
            echo "no metrics scope changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/coc-keeper/scripts/coc_epistemic_metrics.py
          git commit -m "fix(metrics): count only delivered parse risk"
          git push origin HEAD:feature/scenario-epistemic-blueprint-completion
