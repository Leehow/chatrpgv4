name: epistemic-completion-diagnostics

on:
  pull_request:
    branches:
      - feature/scenario-epistemic-director-v1

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/scenario-epistemic-blueprint-completion
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install pytest pypdf
      - name: Run focused epistemic suites
        run: >-
          PYTHONDONTWRITEBYTECODE=1 python -m pytest
          tests/test_cognitive_storylets_narration_metrics.py
          tests/test_epistemic_storylets_additional.py
          tests/test_epistemic_playtest_report.py
          tests/test_epistemic_blueprint_e2e.py
          tests/test_storylets.py
          tests/test_narration_envelope.py
          tests/test_narration_contract.py
          tests/test_playtest_report.py
          -q -p no:cacheprovider
      - name: Run plugin metadata regression
        run: >-
          PYTHONDONTWRITEBYTECODE=1 python -m pytest
          tests/test_plugin_metadata.py
          -q -p no:cacheprovider
      - name: Run full repository suite
        run: PYTHONDONTWRITEBYTECODE=1 python -m pytest tests/ -q -p no:cacheprovider
