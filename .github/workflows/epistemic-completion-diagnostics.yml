name: epistemic-completion-diagnostics

on:
  push:
    branches:
      - feature/scenario-epistemic-blueprint-completion
    paths:
      - .github/epistemic-completion-trigger

permissions:
  contents: read

jobs:
  focused-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install pytest pypdf
      - name: Run focused tests and capture full diagnostics
        id: focused
        continue-on-error: true
        run: |
          set +e
          PYTHONDONTWRITEBYTECODE=1 python -m pytest \
            tests/test_cognitive_storylets_narration_metrics.py \
            -q -p no:cacheprovider --tb=long > /tmp/epistemic-focused.log 2>&1
          status=$?
          cat /tmp/epistemic-focused.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit $status
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epistemic-focused-log
          path: /tmp/epistemic-focused.log
      - name: Fail job after upload
        if: steps.focused.outcome == 'failure'
        run: exit 1
