name: epistemic-boundary-hardening

on:
  pull_request:
    branches:
      - feature/scenario-epistemic-director-v1

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/scenario-epistemic-blueprint-completion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install pytest pypdf
      - name: Apply boundary hardening
        run: python scripts/apply_epistemic_boundary_hardening.py
      - name: Run focused boundary and regression suites
        run: >-
          PYTHONDONTWRITEBYTECODE=1 python -m pytest
          tests/test_epistemic_boundary_hardening.py
          tests/test_source_evidence_bridge.py
          tests/test_epistemic_compiler_lifecycle_v2.py
          tests/test_epistemic_blueprint_e2e.py
          -q -p no:cacheprovider
      - name: Run full repository suite
        run: PYTHONDONTWRITEBYTECODE=1 python -m pytest tests/ -q -p no:cacheprovider
      - name: Commit hardened runtime files
        run: |
          if git diff --quiet -- \
            plugins/coc-keeper/scripts/coc_epistemic_compile.py \
            plugins/coc-keeper/scripts/coc_pdf_source.py \
            plugins/coc-keeper/scripts/coc_scenario_compile.py; then
            echo "no boundary changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            plugins/coc-keeper/scripts/coc_epistemic_compile.py \
            plugins/coc-keeper/scripts/coc_pdf_source.py \
            plugins/coc-keeper/scripts/coc_scenario_compile.py
          git commit -m "fix(epistemic): harden semantic source boundaries"
          git push origin HEAD:feature/scenario-epistemic-blueprint-completion
