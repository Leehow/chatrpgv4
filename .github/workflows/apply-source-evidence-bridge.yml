name: apply-source-evidence-bridge

on:
  push:
    branches:
      - feature/scenario-epistemic-blueprint-completion
    paths:
      - .github/source-evidence-trigger
  pull_request:
    branches:
      - feature/scenario-epistemic-director-v1

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/scenario-epistemic-blueprint-completion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install pytest pypdf
      - name: Apply source evidence patch once
        run: |
          if grep -q "def _check_source_evidence" plugins/coc-keeper/scripts/coc_scenario_compile.py; then
            echo "source evidence patch already applied"
          else
            python scripts/apply_source_evidence_compile_patch.py
          fi
      - name: Run focused source evidence tests
        id: focused
        continue-on-error: true
        run: |
          set +e
          PYTHONDONTWRITEBYTECODE=1 python -m pytest \
            tests/test_source_evidence_bridge.py \
            tests/test_pdf_cache.py \
            tests/test_scenario.py \
            tests/test_scenario_compile.py \
            -q -p no:cacheprovider --tb=short > /tmp/source-focused.log 2>&1
          status=$?
          cat /tmp/source-focused.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit $status
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-evidence-focused-log
          path: /tmp/source-focused.log
      - name: Stop after focused failure
        if: steps.focused.outcome == 'failure'
        run: exit 1
      - name: Run full test suite
        run: PYTHONDONTWRITEBYTECODE=1 python -m pytest tests/ -q -p no:cacheprovider
      - name: Commit generated changes when present
        run: |
          if git diff --quiet -- plugins/coc-keeper/scripts/coc_scenario_compile.py tests/test_pdf_cache.py; then
            echo "no generated source changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/coc-keeper/scripts/coc_scenario_compile.py tests/test_pdf_cache.py
          git commit -m "feat(compiler): validate source evidence bundles"
          git push origin HEAD:feature/scenario-epistemic-blueprint-completion