name: apply-epistemic-lifecycle-v2

on:
  pull_request:
    branches:
      - feature/scenario-epistemic-director-v1

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/scenario-epistemic-blueprint-completion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install pytest pypdf
      - name: Apply lifecycle patch once
        run: |
          if grep -q "import coc_epistemic_lifecycle" plugins/coc-keeper/scripts/coc_scenario_compile.py; then
            echo "epistemic lifecycle patch already applied"
          else
            python scripts/apply_epistemic_lifecycle_v2_patch.py
          fi
      - name: Run focused epistemic v2 tests
        id: focused
        continue-on-error: true
        run: |
          set +e
          PYTHONDONTWRITEBYTECODE=1 python -m pytest \
            tests/test_epistemic_compiler_lifecycle_v2.py \
            tests/test_epistemic_policy.py \
            tests/test_belief_state.py \
            tests/test_epistemic_runtime_integration.py \
            tests/test_epistemic_scenario_compile.py \
            -q -p no:cacheprovider --tb=short > /tmp/epistemic-v2-focused.log 2>&1
          status=$?
          cat /tmp/epistemic-v2-focused.log
          exit $status
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epistemic-v2-focused-log
          path: /tmp/epistemic-v2-focused.log
      - name: Stop after focused failure
        if: steps.focused.outcome == 'failure'
        run: exit 1
      - name: Run full test suite
        run: PYTHONDONTWRITEBYTECODE=1 python -m pytest tests/ -q -p no:cacheprovider
      - name: Commit generated changes when present
        run: |
          if git diff --quiet -- plugins/coc-keeper/scripts/coc_scenario_compile.py plugins/coc-keeper/scripts/coc_story_director.py plugins/coc-keeper/scripts/coc_director_apply.py; then
            echo "no generated lifecycle changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/coc-keeper/scripts/coc_scenario_compile.py plugins/coc-keeper/scripts/coc_story_director.py plugins/coc-keeper/scripts/coc_director_apply.py
          git commit -m "feat(epistemic): integrate compiler confidence and question lifecycle"
          git push origin HEAD:feature/scenario-epistemic-blueprint-completion