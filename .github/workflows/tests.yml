name: tests

on:
  push:
  pull_request:

# Whole-product acceptance is intentionally not scripted in CI. It is run by
# loading the real Codex plugin and relaying player-safe turns to a context-free
# collaboration subagent. CI covers deterministic contracts only.
jobs:
  python:
    name: Deterministic Python contracts (CPython 3.14.6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          enable-cache: true
      - name: Sync frozen Python environment
        run: uv sync --frozen --dev
      - name: Run deterministic contracts
        run: PYTHONDONTWRITEBYTECODE=1 uv run --frozen python -m pytest tests/ -q -p no:cacheprovider

  plugin-metadata:
    name: Plugin metadata and release consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          enable-cache: true
      - name: Sync frozen Python environment
        run: uv sync --frozen --dev
      - name: Validate plugin metadata and release consistency
        run: >-
          PYTHONDONTWRITEBYTECODE=1 uv run --frozen python -m pytest
          tests/test_plugin_metadata.py
          tests/test_release_consistency.py
          -q -p no:cacheprovider

  production-node-adapters:
    name: Production narrator adapter contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          enable-cache: true
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22.19.0"
          cache: npm
          cache-dependency-path: |
            runtime/adapters/keeper/package-lock.json
            runtime/adapters/pi/package-lock.json
      - name: Install production adapter dependencies
        run: |
          uv sync --frozen --dev
          npm ci --prefix runtime/adapters/keeper
          npm ci --prefix runtime/adapters/pi
      - name: Run production adapter contracts
        run: >-
          PYTHONDONTWRITEBYTECODE=1 uv run --frozen python -m pytest
          tests/test_runtime_pi_adapter_contract.py
          -q -p no:cacheprovider
          -k 'not optional_pi_node_integration_smoke'
