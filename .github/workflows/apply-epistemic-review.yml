name: apply-epistemic-review

on:
  push:
    branches:
      - feature/scenario-epistemic-director-v1
    paths:
      - .github/epistemic-review-trigger
  pull_request:
    branches:
      - release/0.2-alpha

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/scenario-epistemic-director-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install pytest pypdf
      - name: Apply asserted review patch
        run: python scripts/apply_epistemic_review_patch.py
      - name: Run focused epistemic tests
        run: >-
          PYTHONDONTWRITEBYTECODE=1 python -m pytest
          tests/test_epistemic_policy.py
          tests/test_belief_state.py
          tests/test_epistemic_scenario_compile.py
          tests/test_epistemic_runtime_integration.py
          tests/test_epistemic_edge_cases.py
          -q -p no:cacheprovider
      - name: Run full test suite and retain diagnostics only on failure
        run: |
          set +e
          mkdir -p docs/superpowers/diagnostics
          PYTHONDONTWRITEBYTECODE=1 python -m pytest tests/ -q -p no:cacheprovider --tb=short > docs/superpowers/diagnostics/epistemic-review-full-test.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            rm -f docs/superpowers/diagnostics/epistemic-review-full-test.log
          else
            echo "$status" > docs/superpowers/diagnostics/epistemic-review-full-test.status
            grep -E '^(FAILED|ERROR) ' docs/superpowers/diagnostics/epistemic-review-full-test.log || true
            tail -n 20 docs/superpowers/diagnostics/epistemic-review-full-test.log
          fi
          exit 0
      - name: Commit generated source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(director): harden epistemic result resolution"
          git push origin HEAD:feature/scenario-epistemic-director-v1
